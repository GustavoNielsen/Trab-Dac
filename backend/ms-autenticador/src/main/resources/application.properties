spring.application.name=ms-autenticador
# SQL (PostgreSQL example - change to your DB)
# Trocar pro nome do banco, se usar relacional e suas credenciais
spring.datasource.url=jdbc:postgresql://localhost:5432/your_db_name
spring.datasource.username=your_user
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/your_mongo_db